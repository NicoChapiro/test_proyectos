name: Prisma Seed Database

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  seed:
    name: Seed database
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify DATABASE_URL secret is configured
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL GitHub Actions secret is not configured. Add it under Settings > Secrets and variables > Actions > Repository secrets before running this manual seed workflow."
            exit 1
          fi

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Seed database
        run: npm run seed
