name: Resolve Activity Log Prisma Migration

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resolve:
    name: Resolve Activity Log migration
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify DATABASE_URL secret is configured
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL GitHub Actions secret is not configured."
            exit 1
          fi

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Resolve Activity Log migration as applied
        run: npx prisma migrate resolve --applied 20260508000000_add_roadmap_activity_log

      - name: Deploy Prisma migrations
        run: npm run prisma:deploy
